<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💥 SMASH ZONE!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lilita+One&family=Russo+One&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{overflow:hidden;height:100vh;width:100vw;background:#1a1a2e;cursor:none;user-select:none;-webkit-user-select:none;font-family:'Russo One',sans-serif}
  canvas{display:block}

  #splash{position:fixed;inset:0;z-index:1000;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .6s,transform .6s}
  #splash.hidden{opacity:0;transform:scale(1.05);pointer-events:none}
  .s-icon{font-size:clamp(4rem,12vw,8rem);animation:smashPulse 1.2s ease-in-out infinite}
  @keyframes smashPulse{0%,100%{transform:scale(1) rotate(-5deg)}50%{transform:scale(1.15) rotate(5deg)}}
  .s-title{font-family:'Lilita One',cursive;font-size:clamp(3.5rem,11vw,8rem);background:linear-gradient(135deg,#FF6B2C,#FFC312,#FF4757);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(3px 3px 0 rgba(0,0,0,0.3));line-height:1.1}
  .s-sub{font-size:clamp(.9rem,2.5vw,1.4rem);color:rgba(255,255,255,0.6);margin:8px 0 30px;letter-spacing:1px}
  .s-btn{font-family:'Lilita One',cursive;font-size:clamp(1.3rem,3.5vw,2rem);padding:16px 55px;border:none;border-radius:12px;background:linear-gradient(135deg,#FF4757,#FF6B2C);color:white;cursor:pointer;box-shadow:0 6px 0 #c0392b,0 10px 30px rgba(0,0,0,0.4);transition:transform .12s,box-shadow .12s;text-transform:uppercase;letter-spacing:2px}
  .s-btn:hover{transform:translateY(-2px);box-shadow:0 8px 0 #c0392b,0 14px 40px rgba(0,0,0,0.5)}
  .s-btn:active{transform:translateY(4px);box-shadow:0 2px 0 #c0392b}
  .s-controls{margin-top:25px;color:rgba(255,255,255,0.35);font-size:.85rem;text-align:center;line-height:1.8}

  #hud{position:fixed;top:12px;left:50%;transform:translateX(-50%);display:none;gap:20px;align-items:center;z-index:200;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);padding:8px 24px;border-radius:10px;border:1px solid rgba(255,255,255,0.1)}
  .h-item{display:flex;align-items:center;gap:6px;font-size:clamp(.85rem,2vw,1.2rem);color:rgba(255,255,255,0.8)}
  .h-val{color:#FFC312;font-family:'Lilita One',cursive;font-size:1.3em}
  #destruction-bar{width:clamp(100px,20vw,200px);height:12px;background:rgba(255,255,255,0.1);border-radius:6px;overflow:hidden}
  #destruction-fill{height:100%;width:0%;background:linear-gradient(90deg,#FF4757,#FFC312);border-radius:6px;transition:width .3s}

  #level-banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:300;display:none;text-align:center}
  .lb-title{font-family:'Lilita One',cursive;font-size:clamp(3rem,8vw,5rem);color:white;text-shadow:0 4px 20px rgba(0,0,0,0.5);animation:lbPop .5s cubic-bezier(.34,1.56,.64,1)}
  .lb-sub{font-size:1.2rem;color:rgba(255,255,255,0.6);margin-top:8px}
  @keyframes lbPop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}

  #next-btn{position:fixed;bottom:30px;right:30px;z-index:200;display:none;font-family:'Lilita One',cursive;font-size:1.3rem;padding:12px 35px;border:none;border-radius:10px;background:linear-gradient(135deg,#2ED573,#1E90FF);color:white;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,0.2);transition:transform .12s;animation:btnPulse 2s ease-in-out infinite}
  #next-btn:active{transform:translateY(3px)}
  @keyframes btnPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}

  /* ── UPGRADE SCREEN ── */
  #upgrade-screen{position:fixed;inset:0;z-index:400;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.85);backdrop-filter:blur(10px);cursor:default}
  #upgrade-screen.visible{display:flex}
  .up-points{font-family:'Lilita One',cursive;font-size:clamp(1.8rem,4vw,2.5rem);color:#FFC312;margin-bottom:24px;text-shadow:0 2px 10px rgba(255,195,18,0.4)}
  .up-title{font-family:'Lilita One',cursive;font-size:clamp(2rem,5vw,3rem);color:white;margin-bottom:8px}
  .up-subtitle{color:rgba(255,255,255,0.5);margin-bottom:28px;font-size:clamp(0.8rem,2vw,1rem)}
  .up-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;max-width:800px;width:90%;margin-bottom:32px}
  @media(max-width:600px){.up-grid{grid-template-columns:repeat(2,1fr)}}
  .up-card{background:rgba(255,255,255,0.07);border:2px solid rgba(255,255,255,0.12);border-radius:14px;padding:18px 14px;text-align:center;transition:transform .15s,border-color .15s}
  .up-card:hover{transform:translateY(-3px);border-color:rgba(255,255,255,0.25)}
  .up-card .icon{font-size:2.2rem;margin-bottom:6px}
  .up-card .name{font-family:'Lilita One',cursive;font-size:1.1rem;color:white;margin-bottom:4px}
  .up-card .tier{font-size:.8rem;color:rgba(255,255,255,0.5);margin-bottom:8px}
  .up-card .pips{display:flex;justify-content:center;gap:5px;margin-bottom:10px}
  .up-card .pip{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25)}
  .up-card .pip.filled{background:#FFC312;border-color:#FFC312}
  .up-card .buy-btn{font-family:'Lilita One',cursive;font-size:.95rem;padding:8px 18px;border:none;border-radius:8px;background:linear-gradient(135deg,#2ED573,#1E90FF);color:white;cursor:pointer;transition:transform .1s,box-shadow .1s;box-shadow:0 3px 0 rgba(0,0,0,0.2)}
  .up-card .buy-btn:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(0,0,0,0.2)}
  .up-card .buy-btn.maxed{background:linear-gradient(135deg,#666,#888);cursor:default;opacity:0.5}
  .up-card .buy-btn.cant-afford{background:linear-gradient(135deg,#555,#444);cursor:default;opacity:0.4;color:rgba(255,255,255,0.5)}
  .up-card.disabled-card{opacity:0.5}
  .up-card .buy-btn.shake{animation:btnShake .4s ease-in-out}
  @keyframes btnShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
  .up-next{font-family:'Lilita One',cursive;font-size:clamp(1.2rem,3vw,1.6rem);padding:14px 50px;border:none;border-radius:12px;background:linear-gradient(135deg,#FF4757,#FF6B2C);color:white;cursor:pointer;box-shadow:0 5px 0 #c0392b;transition:transform .12s;text-transform:uppercase;letter-spacing:2px}
  .up-next:hover{transform:translateY(-2px)}
  .up-next:active{transform:translateY(3px);box-shadow:0 2px 0 #c0392b}
</style>
</head>
<body>
<a href="../" style="position:fixed;top:12px;left:12px;z-index:1000;text-decoration:none;font-size:28px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;touch-action:manipulation;" aria-label="Back to Arcade">🏠</a>

<div id="splash">
  <div class="s-icon">🔨</div>
  <div class="s-title">SMASH ZONE</div>
  <div class="s-sub">Swing. Smash. Destroy everything.</div>
  <button class="s-btn" onclick="init()">💥 WRECK IT!</button>
  <div class="s-controls">Move mouse to swing the wrecking ball<br>Click & hold for POWER MODE 🔥</div>
</div>

<canvas id="c"></canvas>

<div id="hud">
  <div class="h-item">💰 <span class="h-val" id="h-points">0</span></div>
  <div class="h-item">💥 <span class="h-val" id="h-score">0</span></div>
  <div class="h-item">🏗️ <span class="h-val" id="h-level">1</span></div>
  <div class="h-item" style="gap:10px">
    <span>DESTROYED</span>
    <div id="destruction-bar"><div id="destruction-fill"></div></div>
    <span class="h-val" id="h-pct">0%</span>
  </div>
</div>

<div id="level-banner">
  <div class="lb-title" id="lb-title">LEVEL 1</div>
  <div class="lb-sub" id="lb-sub">Glass Tower</div>
</div>

<button id="next-btn" onclick="nextLevel()">NEXT LEVEL ➜</button>

<div id="upgrade-screen">
  <div class="up-title">UPGRADES</div>
  <div class="up-subtitle">Spend points to power up your wrecking ball</div>
  <div class="up-points" id="up-points">💰 0</div>
  <div class="up-grid" id="up-grid"></div>
  <button class="up-next" onclick="closeUpgradeScreen()">NEXT LEVEL ➜</button>
</div>

<script>
// ═══════════════════════════════════════════
//  SMASH ZONE — Physics Destruction Engine
// ═══════════════════════════════════════════

const cv = document.getElementById('c');
const c = cv.getContext('2d');
let W, H;
function resize() { W = cv.width = innerWidth; H = cv.height = innerHeight; }
addEventListener('resize', resize); resize();

// ── AUDIO ENGINE ──
const AC = window.AudioContext || window.webkitAudioContext;
let ac;
function initAudio() { if (!ac) ac = new AC(); }

function noise(duration, freq, type, vol = 0.15) {
  if (!ac) return;
  const o = ac.createOscillator();
  const g = ac.createGain();
  const f = ac.createBiquadFilter();
  f.type = 'lowpass';
  f.frequency.setValueAtTime(freq, ac.currentTime);
  f.frequency.exponentialRampToValueAtTime(80, ac.currentTime + duration);
  o.type = type;
  o.frequency.setValueAtTime(freq, ac.currentTime);
  if (type === 'sawtooth' || type === 'square') {
    o.frequency.exponentialRampToValueAtTime(30, ac.currentTime + duration);
  }
  g.gain.setValueAtTime(vol, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
  o.connect(f).connect(g).connect(ac.destination);
  o.start(); o.stop(ac.currentTime + duration);
}

function playGlassBreak(force) {
  const v = Math.min(0.2, force * 0.003);
  for (let i = 0; i < 3; i++) {
    setTimeout(() => {
      noise(0.08 + Math.random() * 0.06, 3000 + Math.random() * 4000, 'sine', v * 0.7);
      noise(0.04, 6000 + Math.random() * 3000, 'square', v * 0.3);
    }, i * 15);
  }
  noise(0.12, 800 + Math.random() * 400, 'sawtooth', v * 0.5);
}

function playWoodBreak(force) {
  const v = Math.min(0.2, force * 0.004);
  noise(0.15, 200 + Math.random() * 150, 'sawtooth', v);
  noise(0.08, 400 + Math.random() * 200, 'square', v * 0.6);
  setTimeout(() => noise(0.1, 150, 'triangle', v * 0.4), 30);
}

function playBrickBreak(force) {
  const v = Math.min(0.22, force * 0.005);
  noise(0.2, 100 + Math.random() * 80, 'sawtooth', v);
  noise(0.15, 60, 'square', v * 0.8);
  setTimeout(() => noise(0.12, 80 + Math.random() * 40, 'triangle', v * 0.5), 40);
}

function playSquishBreak(force) {
  if (!ac) return;
  const v = Math.min(0.25, force * 0.005);
  // Low-frequency squelch with pitch bend
  const o = ac.createOscillator();
  const g = ac.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(180, ac.currentTime);
  o.frequency.exponentialRampToValueAtTime(60, ac.currentTime + 0.15);
  g.gain.setValueAtTime(v, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.2);
  o.connect(g).connect(ac.destination);
  o.start(); o.stop(ac.currentTime + 0.2);
  // Bubbly overtone
  setTimeout(() => {
    noise(0.08, 300 + Math.random() * 100, 'sine', v * 0.5);
    noise(0.06, 150 + Math.random() * 80, 'triangle', v * 0.3);
  }, 20);
}

function playImpact(force) {
  const v = Math.min(0.12, force * 0.002);
  noise(0.1, 120, 'sine', v);
}

// ── MATERIALS ──
const SQUISHY_COLORS = ['#44FF44', '#FF44AA', '#AA44FF', '#FF8800', '#44FFDD', '#FF44FF'];
const MAT = {
  glass: {
    hp: 12, density: 0.8, color: 'rgba(150,220,255,0.55)', stroke: 'rgba(180,230,255,0.7)',
    shardColor: () => `rgba(${170+Math.random()*60},${220+Math.random()*35},255,${0.4+Math.random()*0.4})`,
    shards: 12, sfx: playGlassBreak, label: 'Glass',
    fill: (x, y, w, h) => {
      const g = c.createLinearGradient(x, y, x + w, y + h);
      g.addColorStop(0, 'rgba(180,235,255,0.6)');
      g.addColorStop(0.5, 'rgba(140,210,250,0.35)');
      g.addColorStop(1, 'rgba(180,235,255,0.55)');
      return g;
    }
  },
  wood: {
    hp: 25, density: 1.2, color: '#A0724A', stroke: '#7A5533',
    shardColor: () => `hsl(${28+Math.random()*12},${50+Math.random()*20}%,${35+Math.random()*20}%)`,
    shards: 7, sfx: playWoodBreak, label: 'Wood',
    fill: (x, y, w, h) => {
      const g = c.createLinearGradient(x, y, x + w, y);
      g.addColorStop(0, '#B8845A'); g.addColorStop(0.3, '#A0724A');
      g.addColorStop(0.6, '#C09060'); g.addColorStop(1, '#A0724A');
      return g;
    }
  },
  brick: {
    hp: 45, density: 2, color: '#C0503C', stroke: '#8B3626',
    shardColor: () => `hsl(${8+Math.random()*10},${55+Math.random()*20}%,${30+Math.random()*15}%)`,
    shards: 8, sfx: playBrickBreak, label: 'Brick',
    fill: (x, y, w, h) => {
      const g = c.createLinearGradient(x, y, x, y + h);
      g.addColorStop(0, '#D06050'); g.addColorStop(0.5, '#B04535');
      g.addColorStop(1, '#C05545');
      return g;
    }
  },
  stone: {
    hp: 70, density: 3, color: '#888', stroke: '#666',
    shardColor: () => `hsl(0,0%,${35+Math.random()*25}%)`,
    shards: 6, sfx: playBrickBreak, label: 'Stone',
    fill: (x, y, w, h) => {
      const g = c.createLinearGradient(x, y, x, y + h);
      g.addColorStop(0, '#999'); g.addColorStop(0.5, '#777'); g.addColorStop(1, '#888');
      return g;
    }
  },
  squishy: {
    hp: 8, density: 0.5, color: '#44FF44', stroke: '#22CC22',
    shardColor: () => SQUISHY_COLORS[Math.floor(Math.random() * SQUISHY_COLORS.length)],
    shards: 8, sfx: playSquishBreak, label: 'Squishy',
    fill: (x, y, w, h) => {
      const g = c.createRadialGradient(x + w/2, y + h/2, 0, x + w/2, y + h/2, Math.max(w, h));
      // Pick a random-ish bright color based on block position (deterministic per block)
      const ci = Math.floor((x * 7 + y * 13) % SQUISHY_COLORS.length);
      const col = SQUISHY_COLORS[ci];
      g.addColorStop(0, col);
      g.addColorStop(1, col + 'AA');
      return g;
    }
  }
};

// ── PHYSICS CONSTANTS ──
const GRAVITY = 0.65;
const FRICTION = 0.997;
const GROUND_BOUNCE = 0.2;
const DEBRIS_LIMIT = 300;

// ── UPGRADE SYSTEM ──
const UPGRADES = {
  ballSize:  { name: 'Ball Size',   icon: '🔴', tiers: [34, 42, 52, 64],      costs: [100, 300, 600] },
  ballWeight:{ name: 'Ball Weight',  icon: '🏋️', tiers: [1.0, 1.4, 1.9, 2.5],  costs: [100, 300, 600] },
  powerMode: { name: 'Power Mode',  icon: '🔥', tiers: [3.0, 4.5, 6.0, 8.0],  costs: [150, 400, 800] },
  chainLen:  { name: 'Chain Length', icon: '⛓️', tiers: [12, 14, 16, 18],      costs: [100, 250, 500] },
};
let upgradeLevels = { ballSize: 0, ballWeight: 0, powerMode: 0, chainLen: 0 };
let points = 0;
let levelScore = 0; // score earned in current level only

function getUpgradeValue(key) {
  return UPGRADES[key].tiers[upgradeLevels[key]];
}

// ── GAME STATE ──
let blocks = [];
let debris = [];
let splatters = [];
let score = 0;
let currentLevel = 0;
let totalBlocks = 0;
let brokenBlocks = 0;
let shakeX = 0, shakeY = 0, shakeMag = 0;
let gameRunning = false;
let gamePaused = false;
let levelComplete = false;
let mouseX = W / 2, mouseY = H / 2;
let mouseDown = false;
let powerGlow = 0;
let gameTime = 0;
let ballActive = false; // ball stays still until user moves

// ── WRECKING BALL (chain physics) ──
let chainSegments = 12;
const CHAIN_LEN = 32;
let chain = [];
let ballRadius = 34;
let anchorX, anchorY;

function initChain() {
  chainSegments = getUpgradeValue('chainLen');
  ballRadius = getUpgradeValue('ballSize');
  anchorX = W * 0.15; anchorY = 80;
  ballActive = false;
  chain = [];
  for (let i = 0; i <= chainSegments; i++) {
    const x = anchorX;
    const y = anchorY + i * CHAIN_LEN;
    chain.push({ x, y, ox: x, oy: y });
  }
}

function updateChain() {
  // Anchor follows mouse
  const targetAX = mouseX;
  const targetAY = Math.min(Math.max(mouseY * 0.5, 30), H * 0.55);
  anchorX += (targetAX - anchorX) * 0.08;
  anchorY += (targetAY - anchorY) * 0.06;

  if (mouseDown) {
    anchorX += (targetAX - anchorX) * 0.1;
    anchorY += (targetAY - anchorY) * 0.06;
    powerGlow = Math.min(powerGlow + 0.03, 1);
  } else {
    powerGlow *= 0.95;
  }

  chain[0].x = anchorX;
  chain[0].y = anchorY;
  chain[0].ox = anchorX;
  chain[0].oy = anchorY;

  for (let i = 1; i < chain.length; i++) {
    const p = chain[i];
    const vx = (p.x - p.ox) * FRICTION;
    const vy = (p.y - p.oy) * FRICTION;
    p.ox = p.x;
    p.oy = p.y;
    const massScale = 0.5 + (i / chain.length) * 1.0;
    p.x += vx;
    p.y += vy + GRAVITY * massScale;
  }

  for (let iter = 0; iter < 12; iter++) {
    for (let i = 0; i < chain.length - 1; i++) {
      const a = chain[i], b = chain[i + 1];
      const dx = b.x - a.x, dy = b.y - a.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist === 0) continue;
      const diff = (dist - CHAIN_LEN) / dist;
      const mx = dx * diff * 0.5;
      const my = dy * diff * 0.5;
      if (i > 0) { a.x += mx; a.y += my; }
      b.x -= mx; b.y -= my;
    }
    chain[0].x = anchorX; chain[0].y = anchorY;
  }

  const ball = chain[chain.length - 1];
  const groundY = H - 60;
  if (ball.y + ballRadius > groundY) {
    ball.y = groundY - ballRadius;
    const vy = ball.y - ball.oy;
    ball.oy = ball.y + vy * 0.15;
    ball.ox = ball.x - (ball.x - ball.ox) * 0.92;
  }
  if (ball.x - ballRadius < 0) { ball.x = ballRadius; ball.ox = ball.x + (ball.x - ball.ox) * 0.2; }
  if (ball.x + ballRadius > W) { ball.x = W - ballRadius; ball.ox = ball.x + (ball.x - ball.ox) * 0.2; }
}

function getBallVelocity() {
  const b = chain[chain.length - 1];
  return { vx: b.x - b.ox, vy: b.y - b.oy };
}

// ── BLOCKS ──
function createBlock(x, y, w, h, mat) {
  return {
    x, y, w, h, mat,
    hp: MAT[mat].hp,
    maxHp: MAT[mat].hp,
    vx: 0, vy: 0, vr: 0,
    angle: 0,
    dynamic: false,
    settled: 0,
    crackLevel: 0,
    wobble: 0,
  };
}

// ── DEBRIS ──
function spawnDebris(block, force) {
  const mat = MAT[block.mat];
  if (block.mat === 'squishy') {
    spawnSplatter(block, force);
    return;
  }
  const count = mat.shards + Math.floor(force * 0.3);
  for (let i = 0; i < count && debris.length < DEBRIS_LIMIT; i++) {
    const size = 3 + Math.random() * (block.w * 0.25);
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * force * 0.4;
    debris.push({
      x: block.x + block.w * (0.2 + Math.random() * 0.6),
      y: block.y + block.h * (0.2 + Math.random() * 0.6),
      w: size, h: size * (0.4 + Math.random() * 0.8),
      vx: Math.cos(angle) * speed * (0.5 + Math.random()),
      vy: Math.sin(angle) * speed - 2,
      vr: (Math.random() - 0.5) * 15,
      angle: Math.random() * 360,
      color: mat.shardColor(),
      life: 1,
      groundY: H - 60 + Math.random() * 20,
      grounded: false,
    });
  }
}

// ── SPLATTERS (squishy material) ──
function spawnSplatter(block, force) {
  const count = 10 + Math.floor(force * 0.5);
  const colors = ['#44FF44', '#FF44AA', '#AA44FF', '#FF8800', '#44FFDD', '#FF44FF'];
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * force * 0.35;
    const radius = 4 + Math.random() * 8;
    splatters.push({
      x: block.x + block.w * (0.2 + Math.random() * 0.6),
      y: block.y + block.h * (0.2 + Math.random() * 0.6),
      radius: radius,
      maxRadius: radius * (1.5 + Math.random() * 0.5),
      vx: Math.cos(angle) * speed * (0.5 + Math.random()),
      vy: Math.sin(angle) * speed - 1.5,
      color: colors[Math.floor(Math.random() * colors.length)],
      life: 1,
      stuck: false,
      spreading: false,
      groundY: H - 60 + Math.random() * 5,
    });
  }
}

function updateSplatters() {
  splatters.forEach(s => {
    if (s.stuck) {
      // Spread out slowly then fade
      if (s.spreading) {
        s.radius = Math.min(s.radius + 0.15, s.maxRadius);
      }
      s.life -= 0.004;
      return;
    }
    s.vy += GRAVITY * 0.4;
    s.vx *= 0.99;
    s.x += s.vx;
    s.y += s.vy;

    // Stick to ground
    if (s.y + s.radius > s.groundY) {
      s.y = s.groundY - s.radius * 0.3;
      s.stuck = true;
      s.spreading = true;
    }
    // Stick to walls
    if (s.x - s.radius < 0) { s.x = s.radius; s.stuck = true; s.spreading = true; }
    if (s.x + s.radius > W) { s.x = W - s.radius; s.stuck = true; s.spreading = true; }
  });
  splatters = splatters.filter(s => s.life > 0);
}

function drawSplatters() {
  splatters.forEach(s => {
    c.save();
    c.globalAlpha = s.life * 0.8;
    c.fillStyle = s.color;
    c.beginPath();
    c.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
    c.fill();
    // Glossy highlight
    c.globalAlpha = s.life * 0.3;
    c.fillStyle = 'white';
    c.beginPath();
    c.arc(s.x - s.radius * 0.25, s.y - s.radius * 0.25, s.radius * 0.3, 0, Math.PI * 2);
    c.fill();
    c.restore();
  });
  c.globalAlpha = 1;
}

// ── COLLISION ──
function ballBlockCollision() {
  const ball = chain[chain.length - 1];
  const bv = getBallVelocity();
  const speed = Math.sqrt(bv.vx * bv.vx + bv.vy * bv.vy);
  const powerForceMultiplier = getUpgradeValue('powerMode');
  const weightMultiplier = getUpgradeValue('ballWeight');

  blocks.forEach(block => {
    if (block.hp <= 0) return;

    // Circle vs AABB
    const cx = Math.max(block.x, Math.min(ball.x, block.x + block.w));
    const cy = Math.max(block.y, Math.min(ball.y, block.y + block.h));
    const dx = ball.x - cx, dy = ball.y - cy;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < ballRadius) {
      const force = speed * (mouseDown ? powerForceMultiplier : 1.8);
      const overlap = ballRadius - dist;
      const nx = dist > 0 ? dx / dist : 0;
      const ny = dist > 0 ? dy / dist : -1;

      ball.x += nx * overlap * 0.3;
      ball.y += ny * overlap * 0.3;

      const dot = bv.vx * nx + bv.vy * ny;
      const dampening = 0.12;
      ball.ox = ball.x + (bv.vx - 2 * dot * nx * dampening);
      ball.oy = ball.y + (bv.vy - 2 * dot * ny * dampening);

      // Damage block (apply weight multiplier)
      const dmg = force * (1 + powerGlow * 0.5) * weightMultiplier;
      block.hp -= dmg;
      block.crackLevel = 1 - (block.hp / block.maxHp);

      playImpact(force);

      const pushX = bv.vx * 0.7;
      const pushY = bv.vy * 0.5;

      if (block.hp <= 0) {
        // BREAK!
        MAT[block.mat].sfx(force);
        spawnDebris(block, force);
        const pts = Math.floor(10 * MAT[block.mat].density * (1 + powerGlow));
        score += pts;
        points += pts;
        levelScore += pts;
        brokenBlocks++;
        updateHUD();
        shakeMag = Math.min(18, force * 1.5);

        // PROPAGATE
        blocks.forEach(other => {
          if (other.hp <= 0 || other === block) return;
          const cdx = (other.x + other.w/2) - (block.x + block.w/2);
          const cdy = (other.y + other.h/2) - (block.y + block.h/2);
          const cdist = Math.sqrt(cdx*cdx + cdy*cdy);
          const touchDist = Math.max(block.w, block.h) * 1.5;
          if (cdist < touchDist) {
            other.dynamic = true;
            const falloff = 1 - (cdist / touchDist);
            const dirX = cdist > 0 ? cdx / cdist : 0;
            const dirY = cdist > 0 ? cdy / cdist : -1;
            other.vx += (pushX * 0.6 + dirX * force * 0.3) * falloff;
            other.vy += (pushY * 0.4 + dirY * force * 0.2 - 1.5) * falloff;
            other.vr += (Math.random() - 0.5) * force * 0.3 * falloff;
          }
        });
      } else {
        // Wobble for squishy blocks
        if (block.mat === 'squishy') {
          block.wobble = 1.0;
        }
        if (!block.dynamic && force > 1.5) {
          block.dynamic = true;
        }
        block.vx += pushX;
        block.vy += pushY;
        block.vr += (Math.random() - 0.5) * force * 0.4;
        shakeMag = Math.min(10, force * 0.6);

        blocks.forEach(other => {
          if (other.hp <= 0 || other === block) return;
          const cdx = (other.x + other.w/2) - (block.x + block.w/2);
          const cdy = (other.y + other.h/2) - (block.y + block.h/2);
          const cdist = Math.sqrt(cdx*cdx + cdy*cdy);
          const touchDist = Math.max(block.w, block.h) * 1.3;
          if (cdist < touchDist) {
            other.dynamic = true;
            const falloff = (1 - cdist / touchDist) * 0.5;
            other.vx += pushX * falloff;
            other.vy += pushY * falloff;
            other.vr += (Math.random() - 0.5) * 2 * falloff;
          }
        });
      }
    }
  });
}

function updateBlocks() {
  const groundY = H - 60;
  const weightMultiplier = getUpgradeValue('ballWeight');

  blocks.forEach(block => {
    if (block.hp <= 0) return;

    // Decay wobble for squishy blocks
    if (block.wobble > 0.01) {
      block.wobble *= 0.9;
    } else {
      block.wobble = 0;
    }

    if (!block.dynamic) return;

    block.vy += GRAVITY * 0.6;
    block.vx *= 0.99;
    block.x += block.vx;
    block.y += block.vy;
    block.angle += block.vr;
    block.vr *= 0.97;

    // Ground
    if (block.y + block.h > groundY) {
      block.y = groundY - block.h;
      if (Math.abs(block.vy) > 3) {
        const fallForce = Math.abs(block.vy) * 2.5;
        block.hp -= fallForce;
        block.crackLevel = 1 - (block.hp / block.maxHp);
        if (block.hp <= 0) {
          MAT[block.mat].sfx(fallForce);
          spawnDebris(block, fallForce);
          const pts = Math.floor(5 * MAT[block.mat].density);
          score += pts;
          points += pts;
          levelScore += pts;
          brokenBlocks++;
          updateHUD();
          shakeMag = Math.min(8, fallForce * 0.4);
        } else if (block.mat === 'squishy') {
          block.wobble = 1.0;
        }
      }
      block.vy *= -GROUND_BOUNCE;
      block.vx *= 0.8;
      block.vr *= 0.7;
      if (Math.abs(block.vy) < 0.5) {
        block.vy = 0;
        block.settled++;
      }
    }

    // Walls
    if (block.x < 0) { block.x = 0; block.vx *= -0.5; }
    if (block.x + block.w > W) { block.x = W - block.w; block.vx *= -0.5; }

    // Block-on-block collision
    blocks.forEach(other => {
      if (other === block || other.hp <= 0) return;
      if (block.x < other.x + other.w && block.x + block.w > other.x &&
          block.y < other.y + other.h && block.y + block.h > other.y) {
        const overlapX = Math.min(block.x + block.w - other.x, other.x + other.w - block.x);
        const overlapY = Math.min(block.y + block.h - other.y, other.y + other.h - block.y);
        const transferRate = 0.6;

        if (overlapX < overlapY) {
          if (block.x < other.x) {
            block.x -= overlapX * 0.4;
            other.x += overlapX * 0.4;
          } else {
            block.x += overlapX * 0.4;
            other.x -= overlapX * 0.4;
          }
          other.dynamic = true;
          const avgVx = (block.vx + other.vx) * 0.5;
          other.vx += (block.vx - other.vx) * transferRate;
          block.vx = avgVx * 0.5;
          other.vr += block.vx * 0.15;
        } else {
          if (block.y < other.y) {
            block.y -= overlapY * 0.4;
            other.y += overlapY * 0.2;
            block.vy *= -GROUND_BOUNCE;
            if (Math.abs(block.vy) > 1) {
              other.dynamic = true;
              other.vy += block.vy * transferRate;
              other.vx += block.vx * 0.3;
              other.vr += (Math.random() - 0.5) * 2;
              if (Math.abs(block.vy) > 5) {
                const impactDmg = Math.abs(block.vy) * MAT[block.mat].density * 0.3;
                other.hp -= impactDmg;
                other.crackLevel = 1 - (other.hp / other.maxHp);
                if (other.hp <= 0) {
                  MAT[other.mat].sfx(impactDmg);
                  spawnDebris(other, impactDmg);
                  const pts = Math.floor(5 * MAT[other.mat].density);
                  score += pts;
                  points += pts;
                  levelScore += pts;
                  brokenBlocks++;
                  updateHUD();
                  shakeMag = Math.max(shakeMag, impactDmg * 0.3);
                } else if (other.mat === 'squishy') {
                  other.wobble = 1.0;
                }
              }
            }
            if (Math.abs(block.vy) < 0.5) block.settled++;
          } else {
            block.y += overlapY * 0.4;
            other.dynamic = true;
            other.vy += block.vy * transferRate * 0.5;
            other.vx += block.vx * 0.2;
          }
        }
      }
    });
  });

  blocks = blocks.filter(b => b.hp > 0);
}

function updateDebris() {
  debris.forEach(d => {
    if (d.grounded) { d.life -= 0.003; return; }
    d.vy += GRAVITY * 0.6;
    d.vx *= 0.995;
    d.x += d.vx;
    d.y += d.vy;
    d.angle += d.vr;

    if (d.y > d.groundY) {
      d.y = d.groundY;
      d.vy *= -0.2;
      d.vx *= 0.7;
      d.vr *= 0.5;
      if (Math.abs(d.vy) < 1) {
        d.grounded = true;
        d.vy = 0;
      }
    }
    if (d.x < 0 || d.x > W) d.vx *= -0.5;
  });
  debris = debris.filter(d => d.life > 0);
}

// ── SCREEN SHAKE ──
function updateShake() {
  if (shakeMag > 0.1) {
    shakeX = (Math.random() - 0.5) * shakeMag;
    shakeY = (Math.random() - 0.5) * shakeMag;
    shakeMag *= 0.88;
  } else {
    shakeX = shakeY = shakeMag = 0;
  }
}

// ── DRAWING ──
function drawBackground() {
  const sky = c.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#1a1a2e');
  sky.addColorStop(0.5, '#16213e');
  sky.addColorStop(0.85, '#1a1a2e');
  sky.addColorStop(1, '#2d2d44');
  c.fillStyle = sky;
  c.fillRect(0, 0, W, H);

  c.fillStyle = 'rgba(255,255,255,0.3)';
  for (let i = 0; i < 40; i++) {
    const sx = (i * 137.5 + 50) % W;
    const sy = (i * 97.3 + 20) % (H * 0.5);
    const sr = 0.5 + (i % 3) * 0.5;
    c.beginPath(); c.arc(sx, sy, sr, 0, Math.PI * 2); c.fill();
  }

  c.fillStyle = '#2d2d44';
  c.fillRect(0, H - 60, W, 60);
  c.fillStyle = '#3a3a55';
  c.fillRect(0, H - 60, W, 3);

  c.strokeStyle = 'rgba(255,255,255,0.03)';
  c.lineWidth = 1;
  for (let x = 0; x < W; x += 40) {
    c.beginPath(); c.moveTo(x, H - 57); c.lineTo(x + 20, H); c.stroke();
  }
}

function drawChain() {
  c.strokeStyle = '#666';
  c.lineWidth = 4;
  c.lineCap = 'round';
  c.beginPath();
  chain.forEach((p, i) => {
    if (i === 0) c.moveTo(p.x, p.y);
    else c.lineTo(p.x, p.y);
  });
  c.stroke();

  c.fillStyle = '#888';
  for (let i = 1; i < chain.length - 1; i += 2) {
    c.beginPath();
    c.arc(chain[i].x, chain[i].y, 3, 0, Math.PI * 2);
    c.fill();
  }

  c.fillStyle = '#AAA';
  c.beginPath();
  c.arc(anchorX, anchorY, 8, 0, Math.PI * 2);
  c.fill();
  c.fillStyle = '#888';
  c.beginPath();
  c.arc(anchorX, anchorY, 4, 0, Math.PI * 2);
  c.fill();
}

function drawBall() {
  const ball = chain[chain.length - 1];

  if (powerGlow > 0.05) {
    const grd = c.createRadialGradient(ball.x, ball.y, ballRadius, ball.x, ball.y, ballRadius * 3);
    grd.addColorStop(0, `rgba(255,${Math.floor(100 - powerGlow * 100)},0,${powerGlow * 0.4})`);
    grd.addColorStop(1, 'rgba(255,0,0,0)');
    c.fillStyle = grd;
    c.beginPath(); c.arc(ball.x, ball.y, ballRadius * 3, 0, Math.PI * 2); c.fill();
  }

  c.fillStyle = 'rgba(0,0,0,0.3)';
  c.beginPath();
  c.ellipse(ball.x + 3, H - 56, ballRadius * 0.7, 5, 0, 0, Math.PI * 2);
  c.fill();

  const bg = c.createRadialGradient(ball.x - 8, ball.y - 10, 4, ball.x, ball.y, ballRadius);
  bg.addColorStop(0, '#777');
  bg.addColorStop(0.6, '#444');
  bg.addColorStop(1, '#222');
  c.fillStyle = bg;
  c.beginPath(); c.arc(ball.x, ball.y, ballRadius, 0, Math.PI * 2); c.fill();

  c.fillStyle = 'rgba(255,255,255,0.15)';
  c.beginPath(); c.arc(ball.x - 7, ball.y - 8, ballRadius * 0.35, 0, Math.PI * 2); c.fill();

  c.strokeStyle = '#555';
  c.lineWidth = 3;
  c.beginPath(); c.arc(ball.x, ball.y, ballRadius - 1, 0, Math.PI * 2); c.stroke();
}

function drawBlocks() {
  blocks.forEach(block => {
    if (block.hp <= 0) return;
    const m = MAT[block.mat];

    c.save();

    // Wobble for squishy blocks
    if (block.mat === 'squishy' && block.wobble > 0.01) {
      const cx = block.x + block.w / 2;
      const cy = block.y + block.h / 2;
      const scaleX = 1 + Math.sin(gameTime * 20) * block.wobble * 0.1;
      const scaleY = 1 - Math.sin(gameTime * 20) * block.wobble * 0.08;
      c.translate(cx, cy);
      c.scale(scaleX, scaleY);
      c.translate(-cx, -cy);
    }

    if (block.angle) {
      c.translate(block.x + block.w / 2, block.y + block.h / 2);
      c.rotate(block.angle * Math.PI / 180);
      c.translate(-(block.x + block.w / 2), -(block.y + block.h / 2));
    }

    // Shadow
    c.fillStyle = 'rgba(0,0,0,0.15)';
    c.fillRect(block.x + 3, block.y + 3, block.w, block.h);

    // Block body
    c.fillStyle = m.fill(block.x, block.y, block.w, block.h);
    if (block.mat === 'squishy') {
      // Rounded rectangle for squishy blocks
      const r = Math.min(block.w, block.h) * 0.25;
      c.beginPath();
      c.moveTo(block.x + r, block.y);
      c.lineTo(block.x + block.w - r, block.y);
      c.quadraticCurveTo(block.x + block.w, block.y, block.x + block.w, block.y + r);
      c.lineTo(block.x + block.w, block.y + block.h - r);
      c.quadraticCurveTo(block.x + block.w, block.y + block.h, block.x + block.w - r, block.y + block.h);
      c.lineTo(block.x + r, block.y + block.h);
      c.quadraticCurveTo(block.x, block.y + block.h, block.x, block.y + block.h - r);
      c.lineTo(block.x, block.y + r);
      c.quadraticCurveTo(block.x, block.y, block.x + r, block.y);
      c.closePath();
      c.fill();
      // Glossy highlight
      c.fillStyle = 'rgba(255,255,255,0.2)';
      c.beginPath();
      c.ellipse(block.x + block.w * 0.35, block.y + block.h * 0.3, block.w * 0.2, block.h * 0.15, -0.3, 0, Math.PI * 2);
      c.fill();
      // Border
      c.strokeStyle = m.stroke;
      c.lineWidth = 1.5;
      c.beginPath();
      c.moveTo(block.x + r, block.y);
      c.lineTo(block.x + block.w - r, block.y);
      c.quadraticCurveTo(block.x + block.w, block.y, block.x + block.w, block.y + r);
      c.lineTo(block.x + block.w, block.y + block.h - r);
      c.quadraticCurveTo(block.x + block.w, block.y + block.h, block.x + block.w - r, block.y + block.h);
      c.lineTo(block.x + r, block.y + block.h);
      c.quadraticCurveTo(block.x, block.y + block.h, block.x, block.y + block.h - r);
      c.lineTo(block.x, block.y + r);
      c.quadraticCurveTo(block.x, block.y, block.x + r, block.y);
      c.closePath();
      c.stroke();
    } else {
      c.fillRect(block.x, block.y, block.w, block.h);
      c.strokeStyle = m.stroke;
      c.lineWidth = 1.5;
      c.strokeRect(block.x, block.y, block.w, block.h);
    }

    // Glass reflection
    if (block.mat === 'glass') {
      c.fillStyle = 'rgba(255,255,255,0.15)';
      c.beginPath();
      c.moveTo(block.x + 3, block.y + 3);
      c.lineTo(block.x + block.w * 0.4, block.y + 3);
      c.lineTo(block.x + 3, block.y + block.h * 0.5);
      c.closePath(); c.fill();
    }

    // Brick lines
    if (block.mat === 'brick' && block.w > 25) {
      c.strokeStyle = 'rgba(0,0,0,0.2)';
      c.lineWidth = 1;
      const bh = block.h / 2;
      c.beginPath();
      c.moveTo(block.x, block.y + bh);
      c.lineTo(block.x + block.w, block.y + bh);
      c.stroke();
      c.beginPath();
      c.moveTo(block.x + block.w / 2, block.y);
      c.lineTo(block.x + block.w / 2, block.y + bh);
      c.stroke();
      c.beginPath();
      c.moveTo(block.x + block.w / 4, block.y + bh);
      c.lineTo(block.x + block.w / 4, block.y + block.h);
      c.stroke();
      c.beginPath();
      c.moveTo(block.x + block.w * 3 / 4, block.y + bh);
      c.lineTo(block.x + block.w * 3 / 4, block.y + block.h);
      c.stroke();
    }

    // Wood grain
    if (block.mat === 'wood') {
      c.strokeStyle = 'rgba(0,0,0,0.1)';
      c.lineWidth = 1;
      for (let i = 0; i < 3; i++) {
        const gy = block.y + block.h * (0.25 + i * 0.25);
        c.beginPath();
        c.moveTo(block.x + 2, gy);
        c.bezierCurveTo(block.x + block.w * 0.3, gy - 3, block.x + block.w * 0.7, gy + 3, block.x + block.w - 2, gy);
        c.stroke();
      }
    }

    // Stone texture
    if (block.mat === 'stone') {
      c.strokeStyle = 'rgba(0,0,0,0.08)';
      c.lineWidth = 1;
      for (let i = 0; i < 2; i++) {
        const sx = block.x + block.w * (0.3 + i * 0.4);
        c.beginPath();
        c.moveTo(sx, block.y);
        c.lineTo(sx + block.w * 0.1, block.y + block.h);
        c.stroke();
      }
    }

    // Cracks (not for squishy)
    if (block.mat !== 'squishy' && block.crackLevel > 0.2) {
      c.strokeStyle = `rgba(0,0,0,${block.crackLevel * 0.6})`;
      c.lineWidth = 1;
      const cx2 = block.x + block.w * (0.3 + Math.sin(block.x) * 0.2);
      const cy2 = block.y + block.h * (0.3 + Math.cos(block.y) * 0.2);
      const numCracks = Math.floor(block.crackLevel * 5);
      for (let i = 0; i < numCracks; i++) {
        const a = (i / numCracks) * Math.PI * 2 + block.x * 0.1;
        const len = block.crackLevel * Math.min(block.w, block.h) * 0.5;
        c.beginPath();
        c.moveTo(cx2, cy2);
        c.lineTo(cx2 + Math.cos(a) * len, cy2 + Math.sin(a) * len);
        c.lineTo(cx2 + Math.cos(a + 0.3) * len * 0.6, cy2 + Math.sin(a + 0.5) * len * 0.7);
        c.stroke();
      }
    }

    // Damage tint (not for squishy)
    if (block.mat !== 'squishy' && block.crackLevel > 0.5) {
      c.fillStyle = `rgba(0,0,0,${(block.crackLevel - 0.5) * 0.3})`;
      c.fillRect(block.x, block.y, block.w, block.h);
    }

    c.restore();
  });
}

function drawDebris() {
  debris.forEach(d => {
    c.save();
    c.globalAlpha = d.life;
    c.translate(d.x, d.y);
    c.rotate(d.angle * Math.PI / 180);
    c.fillStyle = d.color;
    c.fillRect(-d.w / 2, -d.h / 2, d.w, d.h);
    c.restore();
  });
  c.globalAlpha = 1;
}

function drawCursor() {
  c.save();
  c.translate(mouseX, mouseY);
  c.strokeStyle = mouseDown ? `rgba(255,${Math.floor(150 - powerGlow * 150)},0,0.8)` : 'rgba(255,255,255,0.5)';
  c.lineWidth = 2;
  const cs = 12;
  c.beginPath(); c.moveTo(-cs, 0); c.lineTo(-cs / 3, 0); c.stroke();
  c.beginPath(); c.moveTo(cs, 0); c.lineTo(cs / 3, 0); c.stroke();
  c.beginPath(); c.moveTo(0, -cs); c.lineTo(0, -cs / 3); c.stroke();
  c.beginPath(); c.moveTo(0, cs); c.lineTo(0, cs / 3); c.stroke();
  c.beginPath(); c.arc(0, 0, cs / 2, 0, Math.PI * 2);
  c.stroke();
  c.restore();
}

// ── HUD ──
function updateHUD() {
  document.getElementById('h-score').textContent = score;
  document.getElementById('h-points').textContent = points;
  const pct = totalBlocks > 0 ? Math.floor((brokenBlocks / totalBlocks) * 100) : 0;
  document.getElementById('h-pct').textContent = pct + '%';
  document.getElementById('destruction-fill').style.width = Math.min(pct, 100) + '%';

  if (pct >= 90 && !levelComplete) {
    levelComplete = true;
    showLevelComplete();
  }
}

function showLevelComplete() {
  // Show "LEVEL COMPLETE!" banner
  const banner = document.getElementById('level-banner');
  document.getElementById('lb-title').textContent = 'LEVEL COMPLETE!';
  document.getElementById('lb-sub').textContent = `${brokenBlocks}/${totalBlocks} blocks destroyed`;
  banner.style.display = 'block';

  // After 1.5 seconds, show upgrade screen
  setTimeout(() => {
    banner.style.display = 'none';
    showUpgradeScreen();
  }, 1500);
}

function showNextLevel() {
  document.getElementById('next-btn').style.display = 'block';
}

// ── UPGRADE SCREEN ──
function showUpgradeScreen() {
  gamePaused = true;
  const screen = document.getElementById('upgrade-screen');
  screen.classList.add('visible');
  renderUpgradeCards();
}

function closeUpgradeScreen() {
  const screen = document.getElementById('upgrade-screen');
  screen.classList.remove('visible');
  gamePaused = false;
  // Advance to next level
  const next = currentLevel + 1;
  if (next < LEVELS.length) {
    loadLevel(next);
  } else {
    // All levels done — show victory and restart
    const banner = document.getElementById('level-banner');
    document.getElementById('lb-title').textContent = 'YOU WIN!';
    document.getElementById('lb-sub').textContent = 'All levels destroyed! Starting over with upgrades...';
    banner.style.display = 'block';
    setTimeout(() => {
      banner.style.display = 'none';
      loadLevel(0);
    }, 3000);
  }
}

function renderUpgradeCards() {
  document.getElementById('up-points').textContent = '💰 ' + points;
  const grid = document.getElementById('up-grid');
  grid.innerHTML = '';

  Object.keys(UPGRADES).forEach(key => {
    const up = UPGRADES[key];
    const level = upgradeLevels[key];
    const maxed = level >= up.tiers.length - 1;
    const cost = maxed ? 0 : up.costs[level];
    const canAfford = !maxed && points >= cost;

    const card = document.createElement('div');
    card.className = 'up-card' + (maxed || !canAfford ? ' disabled-card' : '');
    card.innerHTML = `
      <div class="icon">${up.icon}</div>
      <div class="name">${up.name}</div>
      <div class="tier">${maxed ? '⭐ MAX' : 'LVL ' + level + '/' + (up.tiers.length - 1)}</div>
      <div class="pips">${Array.from({length: up.tiers.length - 1}, (_, i) =>
        `<div class="pip${i < level ? ' filled' : ''}"></div>`
      ).join('')}</div>
      <button class="buy-btn${maxed ? ' maxed' : (!canAfford ? ' cant-afford' : '')}" data-key="${key}" data-cost="${cost}">
        ${maxed ? '⭐ MAX' : '💰 ' + cost}
      </button>
    `;
    grid.appendChild(card);

    if (!maxed && canAfford) {
      const btn = card.querySelector('.buy-btn');
      btn.addEventListener('click', () => buyUpgrade(key));
      btn.addEventListener('touchstart', (e) => { e.preventDefault(); buyUpgrade(key); });
    }
  });
}

function buyUpgrade(key) {
  const up = UPGRADES[key];
  const level = upgradeLevels[key];
  if (level >= up.tiers.length - 1) return;

  const cost = up.costs[level];
  if (points < cost) {
    // Shake the button and flash red
    const btn = document.querySelector(`.buy-btn[data-key="${key}"]`);
    if (btn) {
      btn.style.background = 'linear-gradient(135deg, #FF4757, #FF2020)';
      btn.classList.remove('shake');
      void btn.offsetWidth; // force reflow
      btn.classList.add('shake');
      setTimeout(() => {
        btn.style.background = '';
      }, 400);
    }
    return;
  }

  points -= cost;
  upgradeLevels[key] = level + 1;

  // Apply upgrades immediately
  ballRadius = getUpgradeValue('ballSize');
  if (key === 'chainLen') {
    initChain();
  }

  updateHUD();
  renderUpgradeCards();
}

function loadLevel(idx) {
  blocks = [];
  debris = [];
  splatters = [];
  brokenBlocks = 0;
  levelComplete = false;
  levelScore = 0;
  currentLevel = idx;
  document.getElementById('next-btn').style.display = 'none';

  // Apply current upgrades
  ballRadius = getUpgradeValue('ballSize');
  initChain();

  LEVELS[idx].build();
  totalBlocks = blocks.length;
  updateHUD();
  document.getElementById('h-level').textContent = idx + 1;

  // Show banner
  const banner = document.getElementById('level-banner');
  document.getElementById('lb-title').textContent = `Level ${idx + 1}`;
  document.getElementById('lb-sub').textContent = LEVELS[idx].name + ' — ' + LEVELS[idx].sub;
  banner.style.display = 'block';
  setTimeout(() => banner.style.display = 'none', 2000);
}

function nextLevel() {
  const next = currentLevel + 1;
  if (next < LEVELS.length) {
    loadLevel(next);
  } else {
    loadLevel(0);
  }
}

// ── MAIN LOOP ──
let lastTime = 0;
function loop(ts) {
  if (!gameRunning) return;
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  gameTime += dt;

  if (!gamePaused) {
    if (ballActive) {
      updateChain();
      ballBlockCollision();
    }
    updateBlocks();
    updateDebris();
    updateSplatters();
    updateShake();
  }

  c.save();
  c.translate(shakeX, shakeY);

  drawBackground();
  drawSplatters();
  drawDebris();
  drawBlocks();
  drawChain();
  drawBall();
  drawCursor();

  c.restore();

  requestAnimationFrame(loop);
}

// ── INPUT ──
addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; if (gameRunning && !gamePaused) ballActive = true; });
addEventListener('touchmove', e => { e.preventDefault(); mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY; if (gameRunning && !gamePaused) ballActive = true; }, { passive: false });
addEventListener('touchstart', e => { mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY; mouseDown = true; if (gameRunning && !gamePaused) ballActive = true; });
addEventListener('mousedown', () => { mouseDown = true; if (gameRunning && !gamePaused) ballActive = true; });
addEventListener('mouseup', () => mouseDown = false);
addEventListener('touchend', () => mouseDown = false);

// ── INIT ──
function init() {
  initAudio();
  document.getElementById('splash').classList.add('hidden');
  setTimeout(() => document.getElementById('splash').style.display = 'none', 700);
  document.getElementById('hud').style.display = 'flex';

  // Reset upgrades on fresh start
  upgradeLevels = { ballSize: 0, ballWeight: 0, powerMode: 0, chainLen: 0 };
  points = 0;
  score = 0;

  initChain();
  gameRunning = true;
  gamePaused = false;
  lastTime = performance.now();
  loadLevel(0);
  requestAnimationFrame(loop);
}

// Idle bg
function idleBg() {
  if (gameRunning) return;
  c.clearRect(0, 0, W, H);
  drawBackground();
  requestAnimationFrame(idleBg);
}
idleBg();
