<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sophia's Unicorn Adventure</title>
        <style>
        @import url('https://fonts.googleapis.com/css2?family=Pacifico&display=swap');
        canvas {
            border: 1px solid black;
        }
        </style>
    </head>
    <body>
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let gameState = 'menu'; // Can be 'menu' or 'playing'

        const unicorn = {
            x: 50,
            y: canvas.height / 2,
            size: 40,
            speed: 5
        };

        let rainbows = [];
        let clouds = [];
        let friends = [];
        let score = 0;

        function drawUnicorn() {
            ctx.fillStyle = 'pink';
            ctx.beginPath();
            ctx.moveTo(unicorn.x, unicorn.y);
            ctx.lineTo(unicorn.x - 20, unicorn.y + 20);
            ctx.lineTo(unicorn.x + 20, unicorn.y + 20);
            ctx.closePath();
            ctx.fill();
        }

        function drawRainbow(rainbow) {
            ctx.fillStyle = 'rainbow';
            ctx.fillRect(rainbow.x, rainbow.y, rainbow.width, rainbow.height);
        }

        function drawCloud(cloud) {
            ctx.fillStyle = 'gray';
            ctx.beginPath();
            ctx.arc(cloud.x, cloud.y, cloud.size, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawFriend(friend) {
            ctx.fillStyle = 'purple';
            ctx.beginPath();
            ctx.arc(friend.x, friend.y, friend.size, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawMenu() {
            // Draw background for menu
            ctx.fillStyle = '#FFB6C1'; // Light pink background
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw title
            ctx.fillStyle = '#FF69B4'; // Hot pink color for text
            ctx.font = '60px Pacifico, cursive';
            ctx.textAlign = 'center';
            ctx.fillText("Sophia's Unicorn", canvas.width / 2, 100);
            ctx.fillText("Adventure", canvas.width / 2, 170);

            // Draw play button
            ctx.fillStyle = '#4CAF50'; // Green color for button
            roundRect(ctx, canvas.width / 2 - 100, 250, 200, 60, 10, true);
            ctx.fillStyle = 'white';
            ctx.font = '30px Arial';
            ctx.fillText('Play', canvas.width / 2, 290);

            // Draw a rainbow
            const colors = ['#FF0000', '#FF7F00', '#FFFF00', '#00FF00', '#0000FF', '#8B00FF'];
            const rainbowWidth = 300;
            const rainbowHeight = 150;
            const startX = canvas.width / 2 - rainbowWidth / 2;
            const startY = canvas.height - rainbowHeight / 2;

            colors.forEach((color, index) => {
                ctx.beginPath();
                ctx.strokeStyle = color;
                ctx.lineWidth = 15;
                ctx.arc(startX + rainbowWidth / 2, startY + rainbowHeight, 
                        rainbowWidth / 2 - index * 20, Math.PI, 0);
                ctx.stroke();
            });
        }

        // Helper function to draw rounded rectangles
        function roundRect(ctx, x, y, width, height, radius, fill, stroke) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.arcTo(x + width, y, x + width, y + height, radius);
            ctx.arcTo(x + width, y + height, x, y + height, radius);
            ctx.arcTo(x, y + height, x, y, radius);
            ctx.arcTo(x, y, x + width, y, radius);
            ctx.closePath();
            if (fill) {
                ctx.fill();
            }
            if (stroke) {
                ctx.stroke();
            }
        }

        function updateGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (gameState === 'menu') {
                drawMenu();
            } else if (gameState === 'playing') {
                // drawBackground();
                drawUnicorn();
                ctx.clearRect(0, 0, canvas.width, canvas.height);

drawUnicorn();

if (Math.random() < 0.02) {
    rainbows.push({
        x: canvas.width,
        y: Math.random() * (canvas.height - 50),
        width: 100,
        height: 20,
        speed: 2
    });
}

if (Math.random() < 0.01) {
    clouds.push({
        x: canvas.width,
        y: Math.random() * canvas.height,
        size: 30,
        speed: 3
    });
}

rainbows.forEach((rainbow, index) => {
    rainbow.x -= rainbow.speed;
    drawRainbow(rainbow);

    if (rainbow.x + rainbow.width < 0) {
        rainbows.splice(index, 1);
    }

    if (Math.random() < 0.1 && friends.length < 5) {
        friends.push({
            x: rainbow.x + rainbow.width / 2,
            y: rainbow.y - 15,
            size: 15,
            speed: rainbow.speed
        });
    }
});

clouds.forEach((cloud, index) => {
    cloud.x -= cloud.speed;
    drawCloud(cloud);

    if (cloud.x + cloud.size < 0) {
        clouds.splice(index, 1);
    }

    if (
        unicorn.x < cloud.x + cloud.size &&
        unicorn.x + unicorn.size > cloud.x &&
        unicorn.y < cloud.y + cloud.size &&
        unicorn.y + unicorn.size > cloud.y
    ) {
        alert('Game Over! You collected ' + score + ' friends!');
        location.reload();
    }
});

friends.forEach((friend, index) => {
    friend.x -= friend.speed;
    drawFriend(friend);

    if (
        unicorn.x < friend.x + friend.size &&
        unicorn.x + unicorn.size > friend.x &&
        unicorn.y < friend.y + friend.size &&
        unicorn.y + unicorn.size > friend.y
    ) {
        friends.splice(index, 1);
        score++;
    }
});

ctx.fillStyle = 'black';
ctx.font = '20px Arial';
ctx.fillText('Friends: ' + score, 10, 30);



            }

            requestAnimationFrame(updateGame);
        }

        canvas.addEventListener('click', (event) => {
            if (gameState === 'menu') {
                const rect = canvas.getBoundingClientRect();
                const x = event.clientX - rect.left;
                const y = event.clientY - rect.top;

                // Check if click is within play button
                if (x > canvas.width / 2 - 100 && x < canvas.width / 2 + 100 &&
                    y > 250 && y < 310) {
                    gameState = 'playing';
                }
            }
        });

        document.addEventListener('keydown', (event) => {
            if (gameState === 'playing') {
                if (event.key === 'ArrowUp' && unicorn.y > 0) {
                    unicorn.y -= unicorn.speed;
                } else if (event.key === 'ArrowDown' && unicorn.y < canvas.height - unicorn.size) {
                    unicorn.y += unicorn.speed;
                }
            }
        });

        updateGame();
        </script>
    </body>
</html>
